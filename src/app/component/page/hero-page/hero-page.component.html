<div *ngIf="!!hero" class="flex flex-col items-start gap-8">
  <h2 class="text-2xl font-bold">{{ hero.name | uppercase }} Details</h2>
  <div class="flex flex-col items-start">
    <mat-form-field>
      <mat-label>ID</mat-label>
      <input matInput [value]="hero.id" readonly />
    </mat-form-field>
    <mat-form-field>
      <mat-label>Name</mat-label>
      <input matInput [(ngModel)]="hero.name" />
    </mat-form-field>
  </div>
  <button mat-stroked-button (click)="goBack()">Go back</button>
</div>
