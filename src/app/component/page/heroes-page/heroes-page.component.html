<div class="flex flex-col items-start gap-8">
  <h2 class="text-2xl font-bold">My Heroes</h2>
  <div class="flex flex-col items-start">
    <mat-form-field>
      <mat-label>Name</mat-label>
      <input matInput #name />
    </mat-form-field>
    <button mat-flat-button color="primary" (click)="addHero(name.value)">
      Add hero
    </button>
  </div>
  <mat-chip-set>
    <app-hero-chip *ngFor="let hero of heroes" [hero]="hero"></app-hero-chip>
  </mat-chip-set>
</div>
