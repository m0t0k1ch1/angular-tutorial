<div
  *ngIf="messageService.messages.length > 0"
  class="flex flex-col items-start gap-8"
>
  <h2 class="text-2xl font-bold">Messages</h2>
  <div class="flex flex-col items-start">
    <span *ngFor="let message of messageService.messages">{{ message }}</span>
  </div>
  <button mat-stroked-button (click)="messageService.clear()">
    Clear messages
  </button>
</div>
